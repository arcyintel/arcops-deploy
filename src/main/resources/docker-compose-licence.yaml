# ── ArcOps Licence Server — standalone deployment ──────────────
#
# Runs the licence-server + licence-portal admin UI + their Postgres
# + Redis + Caddy on a dedicated host, separate from the ArcOps MDM
# platform itself. The MDM platform's setup.sh deliberately omits
# this stack (compose profile `licence` is off by default in the main
# production compose); licence runs here, alone, on its own domain.
#
# Required at runtime (provided by setup-licence.sh):
#   - ./keys/arcops-license-private.pem   RSA-4096 PKCS#8 signing key
#   - .env with LICENCE_DB_PASSWORD + LICENCE_PORTAL_* + DOMAIN
#   - /etc/letsencrypt/live/<licence-domain>/{fullchain,privkey}.pem
#
# Usage:
#   docker compose -f docker-compose-licence.yaml up -d

networks:
  licence-internal:
    driver: bridge
  licence-public:
    driver: bridge

volumes:
  pg_licence_data:
  licence_redis_data:
  licence_caddy_data:
  licence_caddy_config:

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres-licence:
    image: postgres:17
    container_name: postgres-licence
    environment:
      POSTGRES_USER: ${LICENCE_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${LICENCE_DB_PASSWORD:?LICENCE_DB_PASSWORD is required}
      POSTGRES_DB: arcops_license
    volumes:
      - pg_licence_data:/var/lib/postgresql/data
    networks:
      - licence-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LICENCE_DB_USERNAME:-postgres} -d arcops_license"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache + rate-limit counters + refresh tokens) ───
  # requirepass is mandatory: this Redis holds portal refresh tokens
  # and the auth rate-limit counters, so an unauthenticated instance
  # is a session-hijack + brute-force-bypass surface. LICENCE_REDIS_PASSWORD
  # is generated by setup-licence.sh.
  redis:
    image: redis:7.0-alpine
    container_name: licence-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${LICENCE_REDIS_PASSWORD:?LICENCE_REDIS_PASSWORD is required}"]
    volumes:
      - licence_redis_data:/data
    networks:
      - licence-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LICENCE_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog (dev SMTP catcher — replace with real SMTP env in prod) ─
  mailhog:
    image: mailhog/mailhog:latest
    container_name: licence-mailhog
    networks:
      - licence-internal
    restart: unless-stopped

  # ── Licence Server (Spring Boot API) ───────────────────────
  licence-server:
    image: ghcr.io/${GHCR_ORG:-arcyintel}/licence:${LICENCE_TAG:-latest}
    container_name: licence-server
    environment:
      # Force the prod Spring profile so SecretSanityCheck runs and the
      # JVM refuses to boot on any dev-default secret (JWT/portal/admin/DB).
      SPRING_PROFILES_ACTIVE: prod
      # Tightened JVM defaults (same envelope as main ArcOps stack
      # post-Faz 1+4): 256 MB cap is more than enough for licence
      # signing throughput; observed ~100 MB heap on test traffic.
      JAVA_OPTS: ${LICENCE_JAVA_OPTS:--Xms128m -Xmx256m -Xss512k -XX:MaxMetaspaceSize=160m -XX:MaxDirectMemorySize=64m -XX:ReservedCodeCacheSize=96m -XX:+UseG1GC -XX:+UseStringDeduplication -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp -Djava.awt.headless=true -Dspring.jmx.enabled=false}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-licence:5432/arcops_license
      SPRING_DATASOURCE_USERNAME: ${LICENCE_DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${LICENCE_DB_PASSWORD:?LICENCE_DB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${LICENCE_REDIS_PASSWORD:?LICENCE_REDIS_PASSWORD is required}
      # Portal auth secrets — the licence-server signs/validates portal JWTs
      # and seeds the first admin from these. SecretSanityCheck (prod profile)
      # hard-fails boot if any are missing or still a dev default.
      ARCOPS_PORTAL_JWT_SECRET: ${LICENCE_PORTAL_JWT_SECRET:?LICENCE_PORTAL_JWT_SECRET is required}
      ARCOPS_PORTAL_SECRET: ${LICENCE_PORTAL_SECRET:?LICENCE_PORTAL_SECRET is required}
      ARCOPS_PORTAL_PASSWORD: ${LICENCE_PORTAL_PASSWORD:?LICENCE_PORTAL_PASSWORD is required}
      ARCOPS_PORTAL_ADMIN_EMAIL: ${LICENCE_PORTAL_ADMIN_EMAIL:?LICENCE_PORTAL_ADMIN_EMAIL is required}
      ARCOPS_PORTAL_ADMIN_PASSWORD: ${LICENCE_PORTAL_ADMIN_PASSWORD:?LICENCE_PORTAL_ADMIN_PASSWORD is required}
      ARCOPS_PORTAL_DOMAIN: ${LICENCE_PORTAL_DOMAIN:-arcyintel.com}
      # licence-server reads ${SMTP_HOST} / ${SMTP_PORT} (not the
      # standard SPRING_MAIL_*). Override these in .env to point at
      # real SMTP (Sendgrid / SES / Postmark / …) for production
      # notification emails.
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      LICENSE_PRIVATE_KEY_PATH: /app/keys/arcops-license-private.pem
      # Stable hostname for the portal to call (Caddy proxies
      # /api/* here; this is the in-cluster name).
      LICENCE_PUBLIC_URL: https://${LICENCE_DOMAIN:?LICENCE_DOMAIN is required}
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      postgres-licence:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - licence-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Licence Portal (admin SPA — nginx-served static build) ──
  licence-portal:
    # Image is published by the licence-ui repo as ghcr.io/arcyintel/licence-ui
    # (the service/container name stays "licence-portal" — Caddy proxies to it).
    image: ghcr.io/${GHCR_ORG:-arcyintel}/licence-ui:${LICENCE_UI_TAG:-latest}
    container_name: licence-portal
    environment:
      # Portal reads these on first load to know where to send API
      # calls and to gate its own login. The portal image embeds
      # only static assets; runtime config is injected via this
      # env block (the entrypoint substitutes them into a runtime
      # config.js the SPA fetches before any route renders).
      ARCOPS_API_URL: https://${LICENCE_DOMAIN}
      ARCOPS_PORTAL_PASSWORD: ${LICENCE_PORTAL_PASSWORD:?LICENCE_PORTAL_PASSWORD is required}
      ARCOPS_PORTAL_SECRET: ${LICENCE_PORTAL_SECRET:?LICENCE_PORTAL_SECRET is required}
    depends_on:
      licence-server:
        condition: service_healthy
    networks:
      - licence-internal
    restart: unless-stopped

  # ── Caddy (TLS reverse proxy) ──────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: licence-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      LICENCE_DOMAIN: ${LICENCE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - licence_caddy_data:/data
      - licence_caddy_config:/config
    depends_on:
      licence-server:
        condition: service_healthy
    networks:
      - licence-internal
      - licence-public
    restart: unless-stopped
    # No healthcheck: Caddy only has a vhost for ${LICENCE_DOMAIN}, so a probe to
    # 127.0.0.1:80 returns 404 (no matching site) and would flap "unhealthy"
    # forever. Nothing depends on caddy's health; liveness is the TLS endpoint.

  # ── arcops-updater (release agent for the LICENCE stack) ───
  # Same image + script as the customer fleet, in TRACK mode pointed at THIS
  # stack: it tracks the licence images at the channel tag (test box → :latest,
  # prod box → :stable) and the licence host files, applying on change with
  # backup → health-gate → rollback. Replaces the old watchtower labels.
  # setup-licence.sh writes ARCOPS_CHANNEL / ARCOPS_TRACK_TAG per --channel.
  arcops-updater:
    image: ghcr.io/${GHCR_ORG:-arcyintel}/arcops-updater:${ARCOPS_UPDATER_TAG:-stable}
    container_name: arcops-updater
    environment:
      ARCOPS_DIR: ${ARCOPS_DIR:-/opt/arcops-licence}
      ARCOPS_UPDATE_MODE: track            # licence stack always tracks a moving tag (no manifest)
      ARCOPS_CHANNEL: ${ARCOPS_CHANNEL:-stable}
      ARCOPS_TRACK_TAG: ${ARCOPS_TRACK_TAG:-stable}   # prod → stable; test box overrides to latest
      ARCOPS_AUTO_UPDATE: ${ARCOPS_AUTO_UPDATE:-true}
      ARCOPS_UPDATE_POLL_INTERVAL: ${ARCOPS_UPDATE_POLL_INTERVAL:-3600}
      ARCOPS_SELF_SERVICE: arcops-updater
      ARCOPS_UPDATER_TAG: ${ARCOPS_UPDATER_TAG:-stable}
      GHCR_ORG: ${GHCR_ORG:-arcyintel}
      # Point the generic track-mode updater at the LICENCE stack's files + images:
      ARCOPS_COMPOSE_URL: ${ARCOPS_COMPOSE_URL:-https://raw.githubusercontent.com/arcyintel/arcops-deploy/main/src/main/resources/docker-compose-licence.yaml}
      ARCOPS_CADDYFILE_URL: ${ARCOPS_CADDYFILE_URL:-https://raw.githubusercontent.com/arcyintel/arcops-deploy/main/Caddyfile.licence}
      ARCOPS_TAG_VARS: "LICENCE_TAG LICENCE_UI_TAG"
      ARCOPS_HEALTH_SERVICES: "licence-server"
      # Licence stack has no mosquitto / .env.template to track (explicitly empty ⇒ skip):
      ARCOPS_MOSQUITTO_URL: ""
      ARCOPS_ENV_TEMPLATE_URL: ""
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/root/.docker/config.json:ro
      # MUST mount at the SAME path — the compose CLI runs in this container but
      # binds HOST paths; ./keys and ./Caddyfile resolve relative to the compose
      # file's dir, so container path must equal host path.
      - ${ARCOPS_DIR:-/opt/arcops-licence}:${ARCOPS_DIR:-/opt/arcops-licence}
    networks:
      - licence-internal
    restart: unless-stopped
