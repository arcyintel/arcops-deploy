# ──────────────────────────────────────────────────────────────────
# Mosquitto ACL file — ONLY consulted when the go-auth `files` backend
# is active (see mosquitto.conf.auth). INERT while allow_anonymous=true
# and the plugin block is off; mounting it has no effect until the flip.
#
# Scope: the SHARED password-file principals (apple/android agents +
# the apple/android/windows backend service clients). Per-device Windows
# agents do NOT appear here — they auth + ACL via the go-auth HTTP
# backend (windows_mdm WindowsMqttAuthService), which scopes each device
# UUID to arcops/windows/devices/{uuid}/** in code.
#
# go-auth precedence (CheckAcl): a user is allowed if EITHER the files
# backend OR the http backend grants. So a backend-service principal
# listed here with broad topic rights, and a windows device granted by
# HTTP, both work on the same broker.
#
# acc codes: 1=read(subscribe) 2=write(publish) 3=readwrite 4=subscribe-pattern
# %u = username, %c = client id. Patterns let one rule cover every device.
# ──────────────────────────────────────────────────────────────────

# ── Backend service clients (apple-mdm / android-mdm / windows-mdm) ──
# They authenticate with the SHARED (MQTT_USERNAME, MQTT_PASSWORD) creds.
# A single principal name is used for all three services + the agents
# (apple/android publish these very creds to their agents at /auth).
# The server side both subscribes (shared-group reads on every device's
# status/telemetry/location/events/responses) and publishes commands, so
# it needs readwrite across the whole arcops/ tree.
user arcops-backend
topic readwrite arcops/#
# Shared-subscription group reads ($share/apple-mdm/..., $share/android-mdm/...,
# $share/windows-mdm/...). Mosquitto evaluates ACL against the REAL topic
# (the $share/{group}/ prefix is stripped before the ACL check), so the
# `arcops/#` readwrite above already covers shared subscriptions.
#
# ── Healthcheck carve-out (REQUIRED for the flip) ──────────────────
# The compose `mosquitto:` healthcheck runs
#   mosquitto_sub -u $MQTT_USERNAME -P $MQTT_PASSWORD -t '$SYS/broker/uptime'
# Under allow_anonymous=false that probe must CONNECT (shared creds) AND
# be allowed to read that one $SYS topic, or the container goes UNHEALTHY
# and apple/android/windows-mdm (depends_on: service_healthy) never start.
# Grant ONLY that exact topic — service clients still can't roam $SYS
# (the broad `arcops/#` rule does not cover $SYS, and there is no other
# $SYS grant). go-auth `files` ACL is allow-list: unlisted ⇒ denied.
topic read $SYS/broker/uptime

# ── Apple / Android AGENTS (shared creds, per-device topic scope) ────
# Apple + Android agents connect with the SAME shared username as the
# backend (AgentAuthResponse.mqtt carries mqttProperties username/pass).
# That means, with a single shared principal, the files backend cannot
# distinguish one apple agent from another by username — they are all
# `arcops-backend`. Per-device isolation for apple/android is therefore
# NOT enforced by this ACL; it is the SAME trust level the fleet has
# today (a shared cred = a shared trust boundary). This is acceptable as
# a FIRST step because the flip's PRIMARY win is "no anonymous CONNECT"
# (closes the open-broker vulnerability) + per-device isolation for the
# Windows fleet via the HTTP backend.
#
# To later give apple/android agents per-device topic isolation, mint a
# per-device username at /auth (e.g. the device UDID) and switch those
# stacks to the HTTP backend too — tracked as a follow-up, NOT this flip.

# ── Pattern rules (apply to every authenticated user) ───────────────
# A connected client may always read/write under a topic path that
# embeds its own client id. Agents set clientId = "agent-{deviceId}"
# (apple/android) — this gives a defence-in-depth scope even though the
# shared username can't be pinned per-device.
pattern readwrite arcops/+/devices/%c/#
