listener 1883

listener 9001
protocol websockets

# Keepalive: allow up to 120s between PINGREQ packets (default: no limit)
# This prevents premature disconnection of mobile agents on unstable networks
max_keepalive 120

# Development: anonymous access enabled
# Production: set allow_anonymous false and configure password_file + acl_file
# password_file /mosquitto/config/passwords.txt
# acl_file /mosquitto/config/acl.conf
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ── mosquitto-go-auth (HTTP backend) ──────────────────────────────
# Uncomment in production to delegate Windows agent auth (CONNECT +
# subscribe/publish ACL) to windows_mdm's MqttAuthController. The
# plugin .so file is baked into the `ghcr.io/arcyintel/mosquitto-
# with-go-auth:2` image (see Dockerfile next to this file).
#
# Once enabled, flip `allow_anonymous` to false so every CONNECT
# round-trips a quick HTTPS call. Apple/Android agents that already
# carry a long-lived dm_secret pass through the same backend; the
# server's auth/acl logic just gates on enrollment_status + topic
# prefix.
#
# auth_plugin /usr/lib/mosquitto-go-auth.so
# auth_opt_backends http
# auth_opt_http_host windows-mdm
# auth_opt_http_port 8085
# auth_opt_http_getuser_uri    /api/windows/agent/mqtt/auth
# auth_opt_http_aclcheck_uri   /api/windows/agent/mqtt/acl
# auth_opt_http_superuser_uri  /api/windows/agent/mqtt/superuser
# auth_opt_http_with_tls false
# auth_opt_http_response_mode status
# auth_opt_http_params_mode json
# auth_opt_cache_enabled true
# auth_opt_auth_cache_seconds 60
# auth_opt_acl_cache_seconds  60
# auth_opt_auth_jitter_seconds 5
