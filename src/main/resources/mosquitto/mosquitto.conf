listener 1883

listener 9001
protocol websockets

# Keepalive: allow up to 120s between PINGREQ packets (default: no limit)
# This prevents premature disconnection of mobile agents on unstable networks
max_keepalive 120

# Development / current production: anonymous access enabled.
#
# ── ENABLING BROKER AUTH (the flip) ───────────────────────────────
# This is a GATED, maintenance-window operation — see the SH4 runbook.
# Do NOT just uncomment lines here: the fully-formed auth config lives
# in `mosquitto.conf.auth` (next to this file), with a matching
# `acl.conf` and a `passwords.txt` you generate first. The flip is:
#
#     cp mosquitto.conf.auth mosquitto.conf   # on the deploy box
#     docker compose restart mosquitto
#
# Rollback = restore this anonymous file + restart. PRE-REQUISITES
# (creds in passwords.txt + MQTT_USERNAME/MQTT_PASSWORD env on the
# backend services + windows-mdm healthy) MUST be in place first or
# the whole fleet is rejected on the next reconnect. The auth variant
# combines a `files` backend (shared apple/android creds + backend
# service clients) with the `http` backend (per-device Windows agents →
# windows_mdm:8087 /api/windows/agent/mqtt/{auth,acl,superuser}).
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
