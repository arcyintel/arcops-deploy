# ── ArcOps Android Enterprise Gateway (AEG) — standalone deployment ──
#
# Runs the central AMAPI broker (android-enterprise-gateway) + its Postgres
# + Caddy on a DEDICATED host, separate from the ArcOps MDM platform and the
# licence server. There is exactly ONE AEG for the whole fleet: it holds the
# single Google Cloud service-account that talks to the Android Management API
# (AMAPI), and every customer's emm-mdm connects to it over https. The MDM
# platform's setup.sh deliberately omits this stack; AEG runs here, alone, on
# its own domain — the same split as the licence server.
#
# Required at runtime (provided by setup-aeg.sh):
#   - ./gcp/service-account.json          GCP service-account key (AMAPI + Pub/Sub)
#   - .env with AEG_DB_PASSWORD + AEG_APP_KEY + AEG_GCP_PROJECT_ID + AEG_DOMAIN
#   - /etc/letsencrypt/live/<aeg-domain>/{fullchain,privkey}.pem
#
# Usage:
#   docker compose -f docker-compose-aeg.yaml up -d

networks:
  aeg-internal:
    driver: bridge
  aeg-public:
    driver: bridge

volumes:
  pg_aeg_data:
  aeg_caddy_data:
  aeg_caddy_config:

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres-aeg:
    image: postgres:17
    container_name: postgres-aeg
    environment:
      POSTGRES_USER: ${AEG_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${AEG_DB_PASSWORD:?AEG_DB_PASSWORD is required}
      POSTGRES_DB: arcops_aeg
    volumes:
      - pg_aeg_data:/var/lib/postgresql/data
    networks:
      - aeg-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AEG_DB_USERNAME:-postgres} -d arcops_aeg"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Android Enterprise Gateway (Spring Boot, AMAPI broker) ──
  android-enterprise-gateway:
    image: ghcr.io/${GHCR_ORG:-arcyintel}/android-enterprise-gateway:${AEG_TAG:-stable}
    container_name: android-enterprise-gateway
    environment:
      # Prod profile: fail-fast if the GCP project-id / SA key are missing
      # (mirrors licence-server's SecretSanityCheck). setup-aeg.sh requires
      # --gcp-key, so both are present before the first `up`.
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${AEG_JAVA_OPTS:--Xms128m -Xmx256m -Xss512k -XX:MaxMetaspaceSize=160m -XX:MaxDirectMemorySize=64m -XX:ReservedCodeCacheSize=96m -XX:+UseG1GC -XX:+UseStringDeduplication -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp -Djava.awt.headless=true -Dspring.jmx.enabled=false}
      DB_HOST: postgres-aeg
      DB_PORT: 5432
      DB_NAME: arcops_aeg
      DB_USERNAME: ${AEG_DB_USERNAME:-postgres}
      DB_PASSWORD: ${AEG_DB_PASSWORD:?AEG_DB_PASSWORD is required}
      # The single GCP service-account for the whole fleet's AMAPI traffic. The
      # JSON is mounted read-only from ./gcp (never baked into the image or
      # committed); the Dockerfile pre-creates /app/gcp owned by the app user.
      AEG_GCP_PROJECT_ID: ${AEG_GCP_PROJECT_ID:?AEG_GCP_PROJECT_ID is required}
      AEG_GCP_SA_KEY_PATH: /app/gcp/service-account.json
      # AES-256 key that encrypts each connector's webhook secret at rest.
      AEG_APP_KEY: ${AEG_APP_KEY:?AEG_APP_KEY is required}
      # Public URL Google redirects to after the managed-Play enterprise sign-up.
      AEG_CALLBACK_URL: ${AEG_CALLBACK_URL:-https://${AEG_DOMAIN}/api/v1/aeg/enterprises/callback}
      # WB3 companion baseline injection — OFF until the companion is on managed Play.
      AEG_COMPANION_ENABLED: ${AEG_COMPANION_ENABLED:-false}
    volumes:
      - ./gcp:/app/gcp:ro
    depends_on:
      postgres-aeg:
        condition: service_healthy
    networks:
      - aeg-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Caddy (TLS reverse proxy) ───────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: aeg-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      AEG_DOMAIN: ${AEG_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - aeg_caddy_data:/data
      - aeg_caddy_config:/config
    depends_on:
      android-enterprise-gateway:
        condition: service_healthy
    networks:
      - aeg-internal
      - aeg-public
    restart: unless-stopped
    # No healthcheck: Caddy only has a vhost for ${AEG_DOMAIN}, so a probe to
    # 127.0.0.1:80 returns 404 and would flap "unhealthy" forever (same as the
    # licence stack). Liveness is the TLS endpoint.

  # ── arcops-updater (release agent for the AEG stack) ────────
  # Same image + script as the customer fleet / licence box, in TRACK mode
  # pointed at THIS stack: it tracks the AEG image at the channel tag (prod box
  # → :stable, test → :latest) and the AEG host files (compose + Caddyfile),
  # applying on change with backup → health-gate → rollback. setup-aeg.sh writes
  # ARCOPS_CHANNEL / ARCOPS_TRACK_TAG per --channel.
  arcops-updater:
    image: ghcr.io/${GHCR_ORG:-arcyintel}/arcops-updater:${ARCOPS_UPDATER_TAG:-stable}
    container_name: arcops-updater
    environment:
      ARCOPS_DIR: ${ARCOPS_DIR:-/opt/arcops-aeg}
      ARCOPS_UPDATE_MODE: track            # AEG stack always tracks a moving tag (no manifest)
      ARCOPS_CHANNEL: ${ARCOPS_CHANNEL:-stable}
      ARCOPS_TRACK_TAG: ${ARCOPS_TRACK_TAG:-stable}   # prod → stable; test box overrides to latest
      ARCOPS_AUTO_UPDATE: ${ARCOPS_AUTO_UPDATE:-true}
      ARCOPS_UPDATE_POLL_INTERVAL: ${ARCOPS_UPDATE_POLL_INTERVAL:-3600}
      ARCOPS_SELF_SERVICE: arcops-updater
      ARCOPS_UPDATER_TAG: ${ARCOPS_UPDATER_TAG:-stable}
      GHCR_ORG: ${GHCR_ORG:-arcyintel}
      # Point the generic track-mode updater at the AEG stack's files + image:
      ARCOPS_COMPOSE_URL: ${ARCOPS_COMPOSE_URL:-https://raw.githubusercontent.com/arcyintel/arcops-deploy/main/src/main/resources/docker-compose-aeg.yaml}
      ARCOPS_CADDYFILE_URL: ${ARCOPS_CADDYFILE_URL:-https://raw.githubusercontent.com/arcyintel/arcops-deploy/main/Caddyfile.aeg}
      ARCOPS_TAG_VARS: "AEG_TAG"
      ARCOPS_HEALTH_SERVICES: "android-enterprise-gateway"
      # AEG stack has no mosquitto / .env.template to track (explicitly empty ⇒ skip):
      ARCOPS_MOSQUITTO_URL: ""
      ARCOPS_ENV_TEMPLATE_URL: ""
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/root/.docker/config.json:ro
      # MUST mount at the SAME path — the compose CLI runs in this container but
      # binds HOST paths; ./gcp and ./Caddyfile resolve relative to the compose
      # file's dir, so container path must equal host path.
      - ${ARCOPS_DIR:-/opt/arcops-aeg}:${ARCOPS_DIR:-/opt/arcops-aeg}
    networks:
      - aeg-internal
    restart: unless-stopped
