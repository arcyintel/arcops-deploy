name: Build and Push arcops-updater

# The release agent image. Built from the commons repo (it vendors
# src/main/resources/arcops-update.sh + updater/entrypoint.sh). Follows the
# same tag model as the services: main push -> :latest + :sha (the moving
# "edge" tag the test server tracks); a vX.Y.Z tag -> :X.Y.Z. Promotion to
# :stable (what customers follow) is done by promote.yml (imagetools re-tag).
on:
  push:
    branches: [main]
    paths:
      - 'updater/**'
      - 'src/main/resources/arcops-update.sh'
      - '.github/workflows/updater-image.yml'
  workflow_dispatch:
# Versioning is uniform across the stack: this builds only the moving :latest
# (+ :sha) on main. release.yml re-tags :latest → :X.Y.Z (incl. this image) and
# promote.yml re-tags :X.Y.Z → :stable — no per-image tag/semver build here.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arcyintel/arcops-updater

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: updater/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
