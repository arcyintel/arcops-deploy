name: Build and Push mosquitto-with-go-auth

# The MQTT broker image: eclipse-mosquitto:2 + the iegomez/mosquitto-go-auth
# plugin baked in (HTTP-delegated per-device auth for the agents). The compose
# `mosquitto:` service pins :2 — a major-version pin independent of the ArcOps
# release line (the broker is infra, upgraded deliberately, NOT re-tagged by
# release.yml / promote.yml). So this builds :2 (+ :latest) directly; there is
# no :X.Y.Z / :stable for it.
on:
  push:
    branches: [main]
    paths:
      - 'src/main/resources/mosquitto/**'
      - '.github/workflows/mosquitto-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arcyintel/mosquitto-with-go-auth

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GHCR_PAT (org-wide write:packages) — same token the other
          # arcyintel image workflows use, so the package lands under the org.
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src/main/resources/mosquitto
          file: src/main/resources/mosquitto/Dockerfile
          push: true
          # Prod boxes are linux/amd64; the go-auth plugin base is amd64-only,
          # so we build a single-arch image (no arm64 leg to fail on).
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:2
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
