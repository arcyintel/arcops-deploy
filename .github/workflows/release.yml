name: Release — pin :latest → :X.Y.Z

# Cut an ArcOps release: freeze the CURRENT validated :latest digest of every
# service as :X.Y.Z, in ghcr, by manifest re-tag (no rebuild, multi-arch safe).
#
# An "ArcOps version" = all services on the same :X.Y.Z + that version's host
# files (compose / Caddyfile / mosquitto / .env.template) at the commons git tag
# vX.Y.Z. So the release action is: push the commons tag vX.Y.Z. That tag both
#   (a) freezes the host files (the manifest URLs point at commons/vX.Y.Z/...), and
#   (b) triggers this workflow to pin every image to :X.Y.Z.
# Promotion of :X.Y.Z → :stable (+ the manifest customers read) is promote.yml.
#
# The test server (edge channel) has already validated :latest by this point;
# :X.Y.Z captures exactly that digest. Optionally stand up a pinned staging box
# (setup.sh --version X.Y.Z) to validate the frozen artifact before promoting.
#
# Requires repo/org secret GHCR_PAT: a token with write:packages over the
# arcyintel/* image packages (the default GITHUB_TOKEN can't write packages
# owned by the sibling service repos). read:packages is implied.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to cut, e.g. 1.5.0 (no leading v)'
        required: true

permissions:
  packages: write
  contents: read

env:
  REGISTRY: ghcr.io
  ORG: arcyintel
  # ghcr image names (NOT the manifest service keys — those hyphenate + rename
  # frontend; the mapping lives in promote.yml where the manifest is written).
  # licence (license-server repo) + licence-ui (licence-portal repo) are the
  # licence-stack images (test→:latest, prod→:stable, same version line) —
  # re-tagged but NOT added to the customer manifest.
  IMAGES: gateway back_core identity apple_mdm android_mdm windows_mdm emm_mdm uconfrontend arcops-updater android-enterprise-gateway licence licence-ui

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve + validate version
        id: v
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          if ! printf '%s' "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version must be X.Y.Z (got '$V')"; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Cutting release $V"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Re-tag every service :latest → :X.Y.Z (by digest)
        run: |
          set -euo pipefail
          V="${{ steps.v.outputs.version }}"
          # ghcr intermittently returns 502/503 under load; retry transient failures.
          retry() { local n=1; until "$@"; do [ "$n" -ge 6 ] && return 1; echo "  …ghcr error, retry $n/6 in $((n*5))s"; sleep $((n*5)); n=$((n+1)); done; }
          fail=0
          for img in $IMAGES; do
            src="$REGISTRY/$ORG/$img:latest"
            dst="$REGISTRY/$ORG/$img:$V"
            echo "::group::$img  latest → $V"
            if retry docker buildx imagetools create --tag "$dst" "$src"; then
              docker buildx imagetools inspect "$dst" | grep -iE 'Name|Digest' | head -3 || true
            else
              echo "::error::failed to pin $img after retries (is $src present in ghcr?)"; fail=1
            fi
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All services pinned to $V. Next: validate, then run promote.yml for $V."

  # Auto release notes: collect every product repo's conventional commits in
  # the (previous tag, this tag] window and commit the structured digest to
  # the PRIVATE arcyintel/arcops-release-notes repo (raw commit subjects can
  # describe security fixes — they must not land in this public repo). The
  # licence server pulls them from there (ReleaseNotesSyncJob, 15 min).
  # Requires secret RELEASE_NOTES_PAT: fine-grained, contents:read on the
  # product repos + contents:read/write on arcops-release-notes.
  notes:
    needs: pin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout arcops-deploy (tags needed for window bounds)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout arcops-release-notes
        uses: actions/checkout@v4
        with:
          repository: arcyintel/arcops-release-notes
          token: ${{ secrets.RELEASE_NOTES_PAT }}
          path: notes-repo

      - name: Generate notes for this version
        env:
          GH_TOKEN: ${{ secrets.RELEASE_NOTES_PAT }}
          FIRST_WINDOW_DAYS: '30'
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          UNTIL=$(git for-each-ref --format='%(creatordate:iso-strict)' "refs/tags/v$V")
          if [ -z "$UNTIL" ]; then
            UNTIL=$(date -u +%Y-%m-%dT%H:%M:%SZ)   # dispatch without a tag yet
          fi
          PREV=$(git tag --list 'v*.*.*' --sort=v:refname | grep -B1 -x "v$V" | head -1)
          if [ -z "$PREV" ] || [ "$PREV" = "v$V" ]; then
            SINCE=$(date -u -d "$UNTIL - ${FIRST_WINDOW_DAYS} days" +%Y-%m-%dT%H:%M:%SZ)
          else
            SINCE=$(git for-each-ref --format='%(creatordate:iso-strict)' "refs/tags/$PREV")
          fi
          echo "Notes window for $V: ($SINCE, $UNTIL]"
          ./scripts/generate-release-notes.sh "$V" "$SINCE" "$UNTIL" ./notes-repo
          ./scripts/update-notes-index.sh ./notes-repo

      - name: Commit + push notes
        run: |
          set -euo pipefail
          cd notes-repo
          git config user.name "arcops-release-bot"
          git config user.email "release-bot@arcyintel.com"
          git add notes/ releases-index.json
          if git diff --cached --quiet; then
            echo "No note changes to commit."; exit 0
          fi
          V="${{ github.event.inputs.version || github.ref_name }}"
          git commit -m "notes: auto release notes for ${V#v}"
          git push || { git pull --rebase && git push; }
